<script>
    let per=Number(prompt("Enter The Value:--")) //Hello Nan
    
    // isNaN(NaN) //True

    // isNaN(10) //False

    if(isNaN(per)){
         console.log("Invalid Number Please fill only number value");
    }
    else if(per>100 || per<0){
        console.log("Invalid Per");
        
    }
    else if(per>=60){
        console.log(per,"First Div");
        
    }
    else if(per>=48){
        console.log(per,"Second Div");
    }
    else if(per>=35){
         console.log(per,"Third Div");
    }
    else{
         console.log(per,"Fail");
    }

</script>
