<script>
    let num=Number(prompt("Enter The Number"))
    let fac=1;

    if(isNaN(num)){
        alert("Please enter digit value");
        
    }
    else if(num<0 ){
        alert("Please enter the positive number")
    }
    else if(num==1 || num==0){ //1  || 0
        console.log(fac);
        
    }
    else{
        for(let i=1;i<=num;i++){
            fac=fac*i
        }
        console.log(fac);
    }


</script>
