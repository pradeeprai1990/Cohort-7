<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            width: 300px;
            height: 300px;
            border: 2px solid blue;
        }
        .activeDiv{
            background-color: yellow;
            color: red;
        }
    </style>
</head>
<body>

    <div class="main ">
        Welcome
    </div>

    <button id="btn1">Add Class</button>
    <button id="btn2">Remove Class</button>
    <button id="btn3">Toogle Class</button>
</body>

<script>
    let btn1Element=document.querySelector("#btn1")
    let btn2Element=document.querySelector("#btn2")
    let btn3Element=document.querySelector("#btn3")

    let mainElement=document.querySelector(".main")

    btn1Element.addEventListener(
        "click",
        ()=>{
           mainElement.classList.add("activeDiv")
        }
    )

    btn2Element.addEventListener(
        "click",
        ()=>{
              mainElement.classList.remove("activeDiv")
        }
    )

    btn3Element.addEventListener(
        "click",
        ()=>{
              mainElement.classList.toggle("activeDiv")
        }
        
    )
</script>
</html>
