<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
      
        <p >
            Lorem ipsum dolor sit amet, consectetur adipisicing elit. Minus molestiae minima velit, libero quia veniam ullam modi, dolores ab nulla, sequi perspiciatis dignissimos cupiditate consequuntur? Nam dignissimos harum commodi quidem.
        </p>

        <button>CSS</button>
</body>
<script>
    let btnElement=document.querySelector("button")
    let paraElement=document.querySelector("p")
   

    // let changeColor=()=>{
    //     alert()
    // }

    btnElement.addEventListener(
        "click",
        ()=>{
           paraElement.style.color="red"
           paraElement.style.fontSize="30px"
           paraElement.style.background="yellow"
        }
    )
    
</script>
</html>
