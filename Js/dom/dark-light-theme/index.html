<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            font-family: sans-serif;
        }

        .dark {
            background-color: black;
            color: white;
        }

        .light {
            background-color: white;
            color: black;
        }

        .btnOuter {
            position: fixed;
            right: 20px;
            top: 20%;
            display: flex;
            gap: 20px;
            flex-direction: column;
        }

        .btnOuter button {
            width: 40px;
            height: 40px;
            border-radius: 50%;

        }

        .btnOuter button:nth-child(1) {
            background-color: black;
            border: 2px solid white;
        }

        .btnOuter button:nth-child(2) {
            background-color: white;
        }
    </style>
</head>

<body>

    <div class="btnOuter">
        <button></button>
        <button></button>
    </div>

    <h1>Welcome</h1>
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Ab autem debitis error excepturi possimus. Expedita
        suscipit quaerat, sunt quam sapiente distinctio delectus est ratione? Alias minus nesciunt corrupti
        exercitationem iste.
    </p>
</body>
<script>
    let allBtn = document.querySelectorAll(".btnOuter button") //NodeList

    allBtn[0].addEventListener(
        "click",
        () => {
            //Dark
            localStorage.setItem("THEMECOLOR", "dark")
            changeThemeColor()

        }
    )
    allBtn[1].addEventListener(
        "click",
        () => {
            //Light 
            localStorage.setItem("THEMECOLOR", "light")
            changeThemeColor()
        }
    )





    let changeThemeColor = () => {
        let getThemeColor = localStorage.getItem("THEMECOLOR")
        if (getThemeColor == "dark") {
            document.body.classList.remove("light")
            document.body.classList.add("dark")
        }
        if (getThemeColor == "light") {
            document.body.classList.add("light")
            document.body.classList.remove("dark")
        }
    }
    changeThemeColor()


    //Array ,Object

    // JSON -- String

</script>

</html>
