<html>
<head>
	<title>Box | CSS</title>
	<style>
		.main{
			width: 1000px;
			display: flex;
			flex-wrap: wrap;
			border-left: 8px solid black;
			border-right: 10px dotted green;
			border-top: 5px dashed black;
			margin: 50px;
		}

		.item1{
			width: 500px;
			height: 100px;
			background-color: lawngreen;
			border: 5px solid blue;
			box-sizing: border-box;
		}
		.item2{
			width: 470px;
			height: 100px;
			margin-left: 30px;
			background-color: pink;
		}
		.item3{
			width: 500px;
			height: 100px;
			background-color: navajowhite;
		}
		.item4{
			width: 500px;
			height: 100px;
			background-color: firebrick;
		}

		.row3{
			width: 1000px;
			height: 350px;
			background-color: firebrick;
		}
	</style>
</head>
<body>
	<div class="main">
		<div class="item1"></div>
		<div class="item2"></div>
		<div class="item3"></div>
		<div class="item4"></div>
	</div>

</body>
</html>
