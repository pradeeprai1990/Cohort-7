<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style>
		*{
			margin: 0px;
			padding: 0px;
			box-sizing:border-box;
		}

		@keyframes rotateElement{
				0%{
					transform: rotate(0deg);
				}
				100%{
					transform: rotate(360deg);
				}


		}
		body{
			background: #080E24;
		}

		.mainSolar{
			width: 450px;
			height: 450px;
			position: relative;
			
			margin:100px auto;
		}

		.part1{
			width: 450px;
			border-radius: 50%;
			height: 450px;
			position: relative;
			border: 2px solid #ccc;
			animation: rotateElement 30s 0s infinite linear;
		}
		.partDisc{
			width: 15px;
			height: 15px;
			background: orange;
			position: absolute;
			left: 155px;
			border-radius: 50%;
		}

		.part1Discborder{
			width: 20px;
			height: 20px;
			border-radius: 50%;
			position: absolute;
			top: -3px;
			left: -3px;
			border: 2px solid blue;
			transform: skew(50deg);
		}

		.part2{
			width: 400px;
			height: 400px;
			position: absolute;
			border-radius: 50%;
			border: 2px solid #ccc;
			bottom: 25px;
			left: 25px;
			animation: rotateElement 20s 0s infinite linear;
		}
		.part2Disc{
			position: absolute;
			width: 12px;
			height: 12px;
			border-radius: 50%;
			left: 100px;
			top: 16px;
			background: pink;
		}
		.part3{
			width: 350px;
			height: 350px;
			border-radius: 50%;
			border: 2px solid #ccc;
			position: absolute;
			bottom: 50px;
			left: 50px;
			animation: rotateElement 18s 0s infinite linear;
		}
		.part3Disc{
			width: 15px;
			height: 15px;
			top: 100px;
			position: absolute;
			left: 4px;
			border-radius: 50%;
			background: paleturquoise;
		}

		.part4{
			width: 300px;
			height: 300px;
			border-radius: 50%;
			border: 2px solid #ccc;
			position: absolute;
			bottom: 75px;
			animation: rotateElement 15s 0s infinite linear;
			left: 75px;
		}

		.part4Disc{
			width: 15px;
			height: 15px;
			top: 40px;
			animation: rotateElement 3s 0s infinite linear;	
			position: absolute;
			left: 30px;
			border-radius: 50%;
			background: blue;
		}

		.whiteDisc{
			width: 4px;
			height: 4px;
			background: white;
			position: absolute;
			top: -10px;
			border-radius: 50%;
		}
	</style>
</head>
<body>
	<div class="mainSolar">
		<div class="part1">
			<div class="partDisc">
				<div class="part1Discborder"></div>
			</div>
		</div>
		<div class="part2">
			<div class="part2Disc"></div>
		</div>	

		<div class="part3">
			<div class="part3Disc"></div>
		</div>

		<div class="part4">
			<div class="part4Disc">
				<div class="whiteDisc"></div>
			</div>
		</div>

	</div>
</body>
</html>
